\<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>XP Training Monitor v1.0</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Courier+Prime:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg: #1a1a2e;
  --window-bg: #ece9d8;
  --xp-blue: #0058e3;
  --xp-blue-dark: #003399;
  --xp-orange: #ff8a00;
  --xp-green: #228b22;
  --webpunk-pink: #ff00ff;
  --webpunk-cyan: #00ffff;
  --border: #808080;
  --border-light: #ffffff;
  --accent: var(--webpunk-pink);
  --accent2: var(--webpunk-cyan);
  --glow: rgba(255, 0, 255, 0.3);
  --text: #000000;
  --muted: #444444;
  --done: rgba(34, 139, 34, 0.2);
  --done-b: var(--xp-green);
  --r-xl: 0px;
  --r-lg: 0px;
  --r-md: 0px;
  --r-pill: 0px;
  --blur: none;
  --sym-color: var(--webpunk-cyan);
  --ring-grad-1: var(--xp-blue);
  --ring-grad-2: var(--webpunk-cyan);
  --timer-grad-1: var(--xp-orange);
  --timer-grad-2: var(--webpunk-pink);
  --prog-bar-grad: linear-gradient(90deg, var(--xp-blue), var(--webpunk-cyan));
  --day-pill-active-bg: var(--xp-blue);
  --title-grad: linear-gradient(to right, var(--xp-blue-dark), var(--xp-blue));
  --pct-grad: var(--xp-blue-dark);
  --streak-num-grad: var(--xp-orange);
  --day-name-grad: var(--xp-blue-dark);
  --timer-digits-grad: var(--text);
  --timer-digits-warn: #ff0000;
  --timer-digits-done: var(--xp-green);
  --complete-day-btn-bg: #228b22;
  --complete-day-btn-border: #000;
  --complete-day-btn-color: #fff;
  --save-preset-btn-bg: #d4d0c8;
  --save-preset-btn-border: #808080;
  --save-preset-btn-color: #000;
  --reset-pill-bg: #ff0000;
  --reset-pill-border: #000;
  --reset-pill-color: #fff;
  --t-btn-primary-bg: var(--xp-blue);
  --t-btn-primary-border: #003399;
  --t-btn-primary-color: #fff;
  --timer-mode-active-bg: var(--xp-blue);
  --timer-mode-active-color: #fff;
  --card-shadow: 2px 2px 0px #000;
  --set-dot-done-bg: var(--xp-green);
  --input-bg: #fff;
  --page-padding: 20px;
  --bento-cols: 1fr 1fr 300px;
  --gap: 15px;
  --h1-size: 48px;
  --h1-spacing: 2px;
  --streak-block-padding: 4px 8px;
  --prog-gap: 15px;
  --prog-padding: 15px;
  --timer-padding: 15px;
  --timer-ring-size: 120px;
  --timer-digits-size: 32px;
  --ex-padding: 15px;
  --day-name-size: 24px;
  --ex-card-padding: 8px 12px;
  --ex-card-gap: 5px 10px;
  --side-panel-width: 380px;
  --bento-cols-open: 1fr 1fr;
}

body {
  font-family: 'Tahoma', 'Segoe UI', sans-serif;
  background: #3a6ea5; /* Classic XP Blue Background */
  background-image: 
    linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.1) 50%),
    linear-gradient(90deg, rgba(255, 0, 0, 0.03), rgba(0, 255, 0, 0.01), rgba(0, 0, 255, 0.03));
  background-size: 100% 4px, 3px 100%;
  color: var(--text);
  height: 100dvh;
  overflow: hidden;
  display: flex;
  flex-direction: column;
  transition: background 0.4s, color 0.4s;
  -webkit-font-smoothing: antialiased;
  position: relative;
}

body::after {
  content: " ";
  display: block;
  position: absolute;
  top: 0; left: 0; bottom: 0; right: 0;
  background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.1) 50%), 
              linear-gradient(90deg, rgba(255, 0, 0, 0.06), rgba(0, 255, 0, 0.02), rgba(0, 0, 255, 0.06));
  z-index: 9999;
  background-size: 100% 2px, 3px 100%;
  pointer-events: none;
}

.card {
  background: var(--window-bg);
  border: 2px solid #003399;
  border-radius: 4px 4px 0 0;
  box-shadow: 2px 2px 0px #000;
  position: relative;
  padding-top: 35px !important;
  overflow: hidden;
}

.card::before {
  content: "System Window";
  position: absolute;
  top: 0; left: 0; right: 0;
  height: 25px;
  background: linear-gradient(to right, #0058e3 0%, #27c1ff 100%);
  color: white;
  font-weight: bold;
  font-size: 12px;
  display: flex;
  align-items: center;
  padding-left: 10px;
  text-shadow: 1px 1px #000;
  border-bottom: 1px solid #003399;
  z-index: 1;
}

.card-progress::before { content: "📊 Progress Monitor.exe"; }
.card-timer::before { content: "⏱ Training_Timer.sys"; }
.card-exercises::before { content: "🏋️ Workout_Routine.dat"; }
.side-panel::before { content: "🔍 Exercise_Details.log"; }

.card:hover { border-color: var(--webpunk-pink); box-shadow: 0 0 15px var(--webpunk-pink); }

.brand-block h1 {
  font-family: 'Courier New', Courier, monospace;
  font-size: var(--h1-size); letter-spacing: var(--h1-spacing); line-height: 1;
  color: var(--webpunk-cyan);
  text-shadow: 3px 3px var(--webpunk-pink), -1px -1px var(--xp-blue);
  text-transform: uppercase;
  font-style: italic;
  animation: glitch 2s infinite;
}

@keyframes glitch {
  0% { transform: translate(0); }
  20% { transform: translate(-2px, 2px); }
  40% { transform: translate(-2px, -2px); }
  60% { transform: translate(2px, 2px); }
  80% { transform: translate(2px, -2px); }
  100% { transform: translate(0); }
}

.btn {
  padding: 5px 15px; border-radius: 0;
  border: 2px solid;
  border-color: #fff #808080 #808080 #fff;
  background: #d4d0c8;
  color: #000;
  font-family: 'Tahoma', sans-serif; font-size: 11px;
  font-weight: bold;
  cursor: pointer;
  text-transform: uppercase;
}

.btn:active {
  border-color: #808080 #fff #fff #808080;
  padding: 6px 14px 4px 16px;
}

.prog-bar-fill {
  height: 100%;
  background: repeating-linear-gradient(
    90deg,
    var(--xp-green),
    var(--xp-green) 10px,
    #32cd32 10px,
    #32cd32 12px
  );
  border-radius: 0;
  transition: width 0.4s steps(10);
  box-shadow: none;
}

.bg-sym {
  position: absolute;
  font-family: 'Courier New', monospace;
  font-weight: bold;
  user-select: none;
  pointer-events: none;
  z-index: 0;
  color: var(--webpunk-cyan);
  opacity: 0.1;
}

/* Остальные стили из оригинала для функциональности... */
/* (Здесь должны быть стили лейаута, табов и т.д. из вашего index.html) */
</style>
</head>
<body>

<div class="bg-symbols" id="bgSymbols"></div>

<div class="page">
  <div class="top-row">
    <div class="brand-block">
      <h1>ASH_TRAIN_XP</h1>
      <span class="brand-badge" style="background:#fff; color:#000; border:1px solid #000;">v1.0.4 build 2001</span>
    </div>
  </div>

  <div class="tab-nav" style="background:#d4d0c8; border:2px solid #808080; padding:2px;">
    <button class="btn active" onclick="switchTab('training',this)">🏋️ WORKOUT.EXE</button>
    <button class="btn" onclick="switchTab('calculators',this)">🧮 CALC.SYS</button>
    <button class="btn" onclick="switchTab('progress',this)">📈 STATS.LOG</button>
  </div>

  <div class="tab-content tab-training active">
    <div class="page-layout" style="display:flex; gap:15px;">
      <div class="card card-progress" style="flex:1;">
        <!-- Контент прогресса -->
        <div class="prog-bar-wrap">
           <div class="prog-bar-track" style="height:25px; background:#fff; border:2px solid #808080;">
              <div class="prog-bar-fill" id="prog-fill" style="width:40%"></div>
           </div>
        </div>
      </div>
      
      <div class="card card-timer" style="width:300px;">
        <!-- Контент таймера -->
        <div class="timer-digits" id="timer-display" style="font-family:monospace; font-size:48px; background:#000; color:#32cd32; padding:10px; border:3px inset #808080;">01:00</div>
        <div style="display:flex; gap:5px; margin-top:10px;">
          <button class="btn" onclick="toggleTimer()">START</button>
          <button class="btn" onclick="resetTimer()">RESET</button>
        </div>
      </div>
    </div>
  </div>
</div>

<script>
// Инициализация фоновых символов
(function(){
  const syms = ['EXE','ERR','XP','01','C:\\','SYS','W95'];
  const container = document.getElementById('bgSymbols');
  for(let i=0; i<20; i++){
    const el = document.createElement('div');
    el.className = 'bg-sym';
    el.textContent = syms[Math.floor(Math.random()*syms.length)];
    el.style.left = Math.random()*100 + '%';
    el.style.top = Math.random()*100 + '%';
    el.style.fontSize = (12 + Math.random()*30) + 'px';
    container.appendChild(el);
  }
})();

// Здесь ваш оригинальный JS для логики тренировок...
</script>
</body>
</html>
