<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Workout Panel</title>

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: Inter, sans-serif;
}

body {
    background: #0b0b0b;
    color: white;
    padding: 20px;
}

.set-panel {
    background: #111111;
    border: 1px solid rgba(255,255,255,0.06);
    border-radius: 28px;
    padding: 22px;
    max-width: 430px;
    margin: 0 auto;
    box-shadow: 0 0 30px rgba(255,255,255,0.03);
}

.exercise-title {
    font-size: 26px;
    font-weight: 700;
}

.exercise-sub {
    margin-top: 6px;
    color: rgba(255,255,255,0.45);
    font-size: 14px;
}

.set-progress {
    display: flex;
    gap: 12px;
    margin-top: 28px;
}

.set-box {
    width: 20px;
    height: 20px;
    border-radius: 7px;
    background: rgba(255,255,255,0.08);
    transition: .25s;
}

.set-box.done {
    background: white;
    box-shadow: 0 0 14px rgba(255,255,255,0.4);
}

.workout-status {
    margin-top: 28px;
    color: rgba(255,255,255,0.6);
    font-size: 15px;
}

.live-timer {
    margin-top: 10px;
    font-size: 54px;
    font-weight: 800;
    letter-spacing: 2px;
}

.set-btn {
    width: 100%;
    height: 60px;
    border: none;
    border-radius: 18px;
    background: white;
    color: black;
    font-size: 16px;
    font-weight: 700;
    margin-top: 26px;
    cursor: pointer;
    transition: .2s;
}

.set-btn:active {
    transform: scale(0.98);
}

.rest-config {
    margin-top: 24px;
}

.rest-config label {
    display: block;
    margin-bottom: 10px;
    color: rgba(255,255,255,0.5);
    font-size: 13px;
}

.rest-input-wrap {
    display: flex;
    align-items: center;
    gap: 12px;
}

.rest-input-wrap input {
    width: 110px;
    height: 48px;
    border-radius: 14px;
    border: 1px solid rgba(255,255,255,0.08);
    background: #1a1a1a;
    color: white;
    font-size: 16px;
    padding: 0 14px;
    outline: none;
}

.rest-input-wrap span {
    color: rgba(255,255,255,0.5);
}

.settings {
    margin-top: 30px;
    padding-top: 24px;
    border-top: 1px solid rgba(255,255,255,0.06);
}

.setting-row {
    display: flex;
    justify-content: space-between;
    align-items: center;
}

.switch {
    position: relative;
    width: 52px;
    height: 30px;
}

.switch input {
    opacity: 0;
    width: 0;
    height: 0;
}

.slider {
    position: absolute;
    inset: 0;
    background: #222;
    border-radius: 999px;
    transition: .25s;
}

.slider::before {
    content: '';
    position: absolute;
    width: 22px;
    height: 22px;
    border-radius: 50%;
    background: white;
    left: 4px;
    top: 4px;
    transition: .25s;
}

.switch input:checked + .slider {
    background: #444;
}

.switch input:checked + .slider::before {
    transform: translateX(22px);
}

.timer-window {
    margin-top: 24px;
    background: #161616;
    border-radius: 20px;
    padding: 20px;
    border: 1px solid rgba(255,255,255,0.05);
}

.timer-window-title {
    color: rgba(255,255,255,0.5);
    font-size: 13px;
    margin-bottom: 8px;
}

.timer-window-time {
    font-size: 42px;
    font-weight: 800;
}
</style>
</head>
<body>

<div class="set-panel">

    <div>
        <div class="exercise-title">Жим лежа</div>
        <div class="exercise-sub">80 кг × 12</div>
    </div>

    <div class="set-progress">
        <div class="set-box"></div>
        <div class="set-box"></div>
        <div class="set-box"></div>
        <div class="set-box"></div>
    </div>

    <div class="workout-status" id="workoutStatus">
        Готов к подходу
    </div>

    <div class="live-timer" id="liveTimer">
        00:00
    </div>

    <button class="set-btn" id="setBtn">
        Начать подход
    </button>

    <div class="rest-config">
        <label>Отдых между подходами</label>

        <div class="rest-input-wrap">
            <input type="number" id="restSeconds" value="90">
            <span>сек</span>
        </div>
    </div>

    <div class="settings">
        <div class="setting-row">
            <span>Отдельное окно таймера</span>

            <label class="switch">
                <input type="checkbox" id="externalTimerToggle" checked>
                <span class="slider"></span>
            </label>
        </div>
    </div>

    <div class="timer-window" id="timerWindow">
        <div class="timer-window-title">Отдельный таймер</div>
        <div class="timer-window-time" id="externalTime">00:00</div>
    </div>

</div>

<script>
let workoutStarted = false;
let currentSet = 0;
let seconds = 0;
let interval;

const setBtn = document.getElementById('setBtn');
const liveTimer = document.getElementById('liveTimer');
const workoutStatus = document.getElementById('workoutStatus');
const boxes = document.querySelectorAll('.set-box');
const restInput = document.getElementById('restSeconds');
const externalToggle = document.getElementById('externalTimerToggle');
const timerWindow = document.getElementById('timerWindow');
const externalTime = document.getElementById('externalTime');

function formatTime(total) {
    const mins = Math.floor(total / 60)
        .toString()
        .padStart(2, '0');

    const secs = (total % 60)
        .toString()
        .padStart(2, '0');

    return `${mins}:${secs}`;
}

function updateBothTimers(value) {
    liveTimer.textContent = value;
    externalTime.textContent = value;
}

function playSound() {
    const audio = new Audio(
        'https://actions.google.com/sounds/v1/alarms/beep_short.ogg'
    );

    audio.play();
}

function startWorkoutTimer() {
    seconds = 0;

    interval = setInterval(() => {
        seconds++;

        updateBothTimers(formatTime(seconds));
    }, 1000);
}

function startRestTimer() {
    let rest = parseInt(restInput.value);

    workoutStatus.textContent = 'Отдых';

    interval = setInterval(() => {
        rest--;

        updateBothTimers(formatTime(rest));

        if (rest <= 0) {
            clearInterval(interval);

            workoutStatus.textContent = 'Время нового подхода';

            updateBothTimers('00:00');

            playSound();

            if (navigator.vibrate) {
                navigator.vibrate([200, 100, 200]);
            }

            setBtn.textContent = 'Начать подход';
            workoutStarted = false;
        }
    }, 1000);
}

setBtn.addEventListener('click', () => {

    if (currentSet >= boxes.length) {
        workoutStatus.textContent = 'Все подходы выполнены';
        return;
    }

    if (!workoutStarted) {
        workoutStarted = true;

        clearInterval(interval);

        workoutStatus.textContent = 'Подход выполняется';

        setBtn.textContent = 'Закончить подход';

        startWorkoutTimer();
    }
    else {
        workoutStarted = false;

        clearInterval(interval);

        boxes[currentSet].classList.add('done');

        currentSet++;

        setBtn.textContent = 'Отдых...';

        startRestTimer();
    }
});

externalToggle.addEventListener('change', () => {

    if (externalToggle.checked) {
        timerWindow.style.display = 'block';
    }
    else {
        timerWindow.style.display = 'none';
    }
});
</script>

</body>
</html>
