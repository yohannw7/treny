<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Тренировки</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg: #0d0818;
  --glass: rgba(255,255,255,0.06);
  --glass-h: rgba(255,255,255,0.10);
  --border: rgba(255,180,150,0.13);
  --border-h: rgba(255,120,100,0.5);
  --accent: #ff7e5f;
  --accent2: #ffb347;
  --glow: rgba(255,100,80,0.35);
  --text: #fff0ea;
  --muted: rgba(255,220,200,0.42);
  --done: rgba(255,100,80,0.18);
  --done-b: rgba(255,140,100,0.5);
  --r-xl: 24px;
  --r-lg: 18px;
  --r-md: 12px;
  --r-pill: 999px;
  --blur: blur(20px);
}

html { scroll-behavior: smooth; }
body {
  font-family: 'DM Sans', sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  overflow-x: hidden;
}

.blob { position: fixed; border-radius: 50%; filter: blur(100px); pointer-events: none; z-index: 0; }
.blob-1 { width: 700px; height: 500px; top: -200px; left: -200px; background: radial-gradient(ellipse, rgba(180,40,120,0.32) 0%, transparent 70%); }
.blob-2 { width: 500px; height: 500px; bottom: -150px; right: -100px; background: radial-gradient(ellipse, rgba(255,100,50,0.22) 0%, transparent 70%); }
.blob-3 { width: 300px; height: 300px; top: 50%; left: 55%; background: radial-gradient(ellipse, rgba(255,160,80,0.1) 0%, transparent 65%); }

.bg-symbols { position: fixed; inset: 0; pointer-events: none; z-index: 0; overflow: hidden; }
.bg-sym {
  position: absolute;
  font-family: 'Bebas Neue', sans-serif;
  color: rgba(255,160,100,0.9);
  user-select: none;
  line-height: 1;
  animation: symFloat ease-in-out infinite;
}
@keyframes symFloat {
  0%,100% { transform: translateY(0) rotate(var(--r0)); }
  50%      { transform: translateY(-16px) rotate(var(--r1)); }
}

.page { position: relative; z-index: 1; max-width: 1200px; margin: 0 auto; padding: 20px 20px 40px; }

/* TOP ROW: Заголовок слева + стрик-плашка справа */
.top-row {
  display: flex; align-items: center; justify-content: space-between;
  margin-bottom: 18px; gap: 16px; flex-wrap: wrap;
}

/* Заголовок */
.brand-block {
  display: flex; align-items: baseline; gap: 12px;
}
.brand-block h1 {
  font-family: 'Bebas Neue', sans-serif;
  font-size: 58px; letter-spacing: 5px; line-height: 1;
  background: linear-gradient(120deg, #fff 0%, #ffb347 100%);
  -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
}
.brand-badge {
  font-size: 11px; color: var(--muted);
  border: 1px solid var(--border);
  padding: 4px 12px; border-radius: var(--r-pill);
  backdrop-filter: var(--blur); background: var(--glass);
  white-space: nowrap;
}

/* Стрик + дни в одной плашке */
.streak-days-block {
  display: flex; align-items: center; gap: 10px;
  background: var(--glass);
  backdrop-filter: var(--blur);
  border: 1px solid var(--border);
  border-radius: var(--r-pill);
  padding: 6px 6px 6px 16px;
  flex-wrap: wrap;
}
.streak-mini { display: flex; align-items: center; gap: 6px; flex-shrink: 0; }
.streak-mini .icon { font-size: 18px; animation: pulse 1.5s ease infinite; }
@keyframes pulse { 0%,100%{opacity:0.6;transform:scale(1)} 50%{opacity:1;transform:scale(1.15)} }
.streak-mini .num {
  font-family: 'Bebas Neue', sans-serif; font-size: 22px;
  background: linear-gradient(135deg, #fff, #ffb347);
  -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
  line-height: 1;
}
.day-pills { display: flex; gap: 5px; flex-wrap: wrap; align-items: center; }
.day-pill {
  padding: 7px 14px; border-radius: var(--r-pill);
  border: 1px solid var(--border);
  background: rgba(0,0,0,0.15);
  color: var(--muted);
  font-family: 'DM Sans', sans-serif; font-size: 12px; font-weight: 500;
  cursor: pointer; transition: all 0.22s; white-space: nowrap;
  display: flex; align-items: center; gap: 6px;
}
.day-pill:hover { background: var(--glass-h); color: var(--text); border-color: rgba(255,255,255,0.2); }
.day-pill.active {
  background: linear-gradient(135deg, rgba(255,126,95,0.32), rgba(200,60,60,0.32));
  border-color: var(--border-h);
  color: #fff;
  box-shadow: 0 2px 18px var(--glow);
}
.day-pill .del-day {
  font-size: 13px; color: var(--muted); cursor: pointer; line-height: 1;
  transition: color 0.2s;
}
.day-pill .del-day:hover { color: #ff6b6b; }
.add-day-btn {
  width: 32px; height: 32px; border-radius: 50%;
  border: 1px dashed var(--border);
  background: transparent;
  color: var(--muted);
  font-size: 18px; cursor: pointer; transition: all 0.2s;
  display: flex; align-items: center; justify-content: center;
  flex-shrink: 0;
}
.add-day-btn:hover { border-color: var(--accent2); color: var(--accent2); background: rgba(255,180,80,0.1); }

/* Bento */
.bento {
  display: grid;
  grid-template-columns: 1fr 1fr 280px;
  grid-template-rows: auto auto;
  gap: 12px;
}

.card {
  background: var(--glass);
  backdrop-filter: var(--blur);
  -webkit-backdrop-filter: var(--blur);
  border: 1px solid var(--border);
  border-radius: var(--r-xl);
  transition: border-color 0.2s, box-shadow 0.2s;
}
.card:hover { border-color: rgba(255,255,255,0.16); }

.card-progress {
  grid-column: 1 / 3;
  padding: 20px 22px;
  display: flex; align-items: center; gap: 20px;
}
.prog-ring-wrap { flex-shrink: 0; position: relative; width: 70px; height: 70px; }
.prog-ring-wrap svg { transform: rotate(-90deg); }
.prog-ring-bg { fill: none; stroke: rgba(255,255,255,0.08); stroke-width: 5; }
.prog-ring-fill { fill: none; stroke: url(#ringGrad); stroke-width: 5; stroke-linecap: round; transition: stroke-dashoffset 0.5s ease; }
.prog-center {
  position: absolute; inset: 0;
  display: flex; align-items: center; justify-content: center;
  font-family: 'Bebas Neue', sans-serif; font-size: 18px; letter-spacing: 1px;
  background: linear-gradient(135deg, #fff, #ffb347);
  -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
}
.prog-text h3 { font-size: 16px; font-weight: 600; margin-bottom: 2px; }
.prog-text p { font-size: 12px; color: var(--muted); }
.prog-bar-wrap { flex: 1; }
.prog-bar-track {
  height: 5px; background: rgba(255,255,255,0.07);
  border-radius: var(--r-pill); overflow: hidden; margin-bottom: 6px;
}
.prog-bar-fill {
  height: 100%;
  background: linear-gradient(90deg, #c0392b, #ff7e5f, #ffb347);
  border-radius: var(--r-pill);
  transition: width 0.4s ease;
  box-shadow: 0 0 12px var(--glow);
}
.prog-stats { display: flex; gap: 16px; }
.prog-stat { font-size: 11px; color: var(--muted); }
.prog-stat span { color: var(--text); font-weight: 500; }

.card-timer {
  grid-column: 3;
  grid-row: 1 / 3;
  padding: 20px 16px;
  display: flex; flex-direction: column; align-items: center; gap: 12px;
}
.timer-mode { display: flex; background: rgba(0,0,0,0.2); border-radius: var(--r-pill); padding: 3px; gap: 0; width: 100%; }
.timer-mode-btn {
  flex: 1; padding: 6px 8px; border-radius: var(--r-pill);
  border: none; background: transparent; color: var(--muted);
  font-family: 'DM Sans', sans-serif; font-size: 11px; font-weight: 500;
  cursor: pointer; transition: all 0.2s; text-align: center;
}
.timer-mode-btn.active {
  background: rgba(255,126,95,0.25);
  color: #ffb347;
  box-shadow: 0 1px 8px var(--glow);
}
.timer-ring-wrap { position: relative; width: 130px; height: 130px; flex-shrink: 0; }
.timer-ring-wrap svg { transform: rotate(-90deg); }
.tr-bg { fill: none; stroke: rgba(255,255,255,0.06); stroke-width: 6; }
.tr-fill { fill: none; stroke: url(#timerGrad); stroke-width: 6; stroke-linecap: round; transition: stroke-dashoffset 0.9s linear; }
.timer-center {
  position: absolute; inset: 0;
  display: flex; flex-direction: column; align-items: center; justify-content: center;
}
.timer-digits {
  font-family: 'Bebas Neue', sans-serif; font-size: 36px; letter-spacing: 2px; line-height: 1;
  background: linear-gradient(135deg, #fff, #ffb347);
  -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
  transition: filter 0.3s;
}
.timer-digits.warning { background: linear-gradient(135deg,#ffa07a,#ff6b35); -webkit-background-clip:text; background-clip:text; filter: drop-shadow(0 0 8px rgba(255,107,53,0.6)); }
.timer-digits.done { background: linear-gradient(135deg,#ff9090,#ff4444); -webkit-background-clip:text; background-clip:text; }
.timer-label { font-size: 9px; color: var(--muted); letter-spacing: 1px; text-transform: uppercase; margin-top: 1px; }
.presets { display: grid; grid-template-columns: 1fr 1fr; gap: 5px; width: 100%; }
.preset-pill {
  padding: 6px 4px; border-radius: var(--r-pill);
  border: 1px solid var(--border);
  background: rgba(0,0,0,0.15);
  color: var(--muted);
  font-family: 'DM Sans', sans-serif; font-size: 11px;
  cursor: pointer; transition: all 0.2s; text-align: center;
}
.preset-pill:hover { border-color: var(--accent); color: var(--accent2); background: rgba(185,127,255,0.1); }
.timer-controls { display: flex; flex-direction: column; gap: 5px; width: 100%; }
.t-btn {
  width: 100%; padding: 9px; border-radius: var(--r-lg);
  border: 1px solid var(--border); background: rgba(0,0,0,0.15);
  color: var(--text); font-family: 'DM Sans', sans-serif;
  font-size: 12px; font-weight: 500; cursor: pointer; transition: all 0.22s;
}
.t-btn:hover { background: var(--glass-h); }
.t-btn.primary {
  background: linear-gradient(135deg, rgba(255,126,95,0.38), rgba(200,60,60,0.38));
  border-color: var(--border-h); color: #fff;
  box-shadow: 0 3px 20px var(--glow);
}
.t-btn.primary:hover { box-shadow: 0 4px 28px rgba(185,127,255,0.45); }
.t-row { display: flex; gap: 5px; }
.t-row .t-btn { flex: 1; }
.laps-box { width: 100%; max-height: 70px; overflow-y: auto; scrollbar-width: thin; scrollbar-color: var(--border) transparent; }
.lap-item { display: flex; justify-content: space-between; font-size: 10px; color: var(--muted); padding: 3px 2px; border-bottom: 0.5px solid var(--border); }
.lap-item:last-child { border-bottom: none; }

.card-exercises { padding: 18px 20px 14px; grid-column: 1 / 3; }
.day-header { display: flex; align-items: baseline; gap: 10px; margin-bottom: 12px; }
.day-name {
  font-family: 'Bebas Neue', sans-serif; font-size: 26px; letter-spacing: 2px;
  background: linear-gradient(120deg, #fff, #ffb347);
  -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
}
.day-count { font-size: 11px; color: var(--muted); }
.edit-day-btn {
  background: none; border: 1px solid var(--border);
  color: var(--muted); cursor: pointer; padding: 3px 10px; border-radius: var(--r-pill);
  font-size: 12px; transition: all 0.2s;
  margin-left: auto;
}
.edit-day-btn:hover { border-color: var(--accent); color: var(--accent2); }

.exercise-list { display: flex; flex-direction: column; gap: 6px; }
.ex-card {
  background: rgba(255,255,255,0.04);
  border: 1px solid var(--border);
  border-radius: var(--r-lg);
  padding: 10px 14px;
  transition: background 0.2s, border-color 0.2s;
  display: grid;
  grid-template-columns: 1fr auto;
  grid-template-rows: auto auto;
  gap: 3px 10px;
  align-items: center;
}
.ex-card:hover { background: rgba(255,255,255,0.07); }
.ex-card.completed { background: var(--done); border-color: var(--done-b); }
.ex-name { font-size: 13px; font-weight: 500; grid-column: 1; grid-row: 1; }
.ex-card.completed .ex-name { color: var(--muted); text-decoration: line-through; }
.ex-target {
  font-size: 10px; color: var(--muted);
  background: rgba(255,255,255,0.06);
  border: 1px solid var(--border);
  padding: 2px 8px; border-radius: var(--r-pill);
  grid-column: 2; grid-row: 1;
  white-space: nowrap; align-self: start;
}
.ex-controls { grid-column: 1; grid-row: 2; display: flex; gap: 4px; align-items: center; flex-wrap: wrap; }
.ex-weight { grid-column: 2; grid-row: 2; display: flex; align-items: center; gap: 4px; }
.set-dot {
  width: 28px; height: 28px; border-radius: 8px;
  border: 1px solid var(--border);
  background: rgba(0,0,0,0.15);
  color: var(--muted);
  font-size: 11px; font-family: 'DM Sans', sans-serif;
  cursor: pointer; transition: all 0.18s;
  display: flex; align-items: center; justify-content: center;
}
.set-dot:hover { border-color: var(--accent); color: var(--accent2); background: rgba(185,127,255,0.1); }
.set-dot.done {
  background: linear-gradient(135deg, rgba(255,126,95,0.55), rgba(255,179,71,0.45));
  border-color: rgba(185,127,255,0.7);
  color: #fff; font-weight: 600;
  box-shadow: 0 2px 10px var(--glow);
}
.kg-label { font-size: 10px; color: var(--muted); }
.kg-input {
  width: 50px; height: 28px; border-radius: 8px;
  border: 1px solid var(--border);
  background: rgba(0,0,0,0.2);
  color: var(--text);
  font-family: 'DM Sans', sans-serif; font-size: 11px;
  text-align: center; padding: 0 4px;
  transition: border-color 0.18s;
}
.kg-input:focus { outline: none; border-color: var(--accent); box-shadow: 0 0 0 3px rgba(185,127,255,0.12); }
.kg-input::placeholder { color: var(--muted); }

.bottom-row { display: flex; justify-content: space-between; align-items: center; margin-top: 12px; flex-wrap: wrap; gap: 8px; }
.bottom-left { display: flex; gap: 8px; align-items: center; flex-wrap: wrap; }
.complete-day-btn {
  padding: 8px 18px; border-radius: var(--r-pill);
  background: linear-gradient(135deg, rgba(46,204,113,0.2), rgba(39,174,96,0.15));
  border: 1px solid rgba(46,204,113,0.35);
  color: #2ecc71;
  font-family: 'DM Sans', sans-serif; font-size: 12px; font-weight: 500;
  cursor: pointer; transition: all 0.2s;
}
.complete-day-btn:hover { background: rgba(46,204,113,0.25); border-color: #2ecc71; }
.save-preset-btn {
  padding: 8px 18px; border-radius: var(--r-pill);
  background: rgba(255,180,80,0.08);
  border: 1px solid rgba(255,180,80,0.2);
  color: var(--accent2);
  font-family: 'DM Sans', sans-serif; font-size: 12px;
  cursor: pointer; transition: all 0.2s;
}
.save-preset-btn:hover { background: rgba(255,180,80,0.16); border-color: var(--accent); }
.preset-select {
  background: var(--glass); border: 1px solid var(--border);
  color: var(--text); padding: 7px 12px; border-radius: var(--r-pill);
  font-family: 'DM Sans', sans-serif; font-size: 12px;
  backdrop-filter: var(--blur); cursor: pointer;
}
.reset-pill {
  padding: 8px 20px; border-radius: var(--r-pill);
  background: rgba(255,80,80,0.07);
  border: 1px solid rgba(255,100,100,0.18);
  color: rgba(255,150,150,0.6);
  font-family: 'DM Sans', sans-serif; font-size: 12px;
  cursor: pointer; transition: all 0.2s;
}
.reset-pill:hover { background: rgba(255,80,80,0.14); border-color: rgba(255,100,100,0.4); color: #ff9090; }

/* Modal */
.modal-overlay {
  position: fixed; inset: 0; background: rgba(0,0,0,0.7);
  backdrop-filter: blur(4px);
  z-index: 100; display: flex; align-items: center; justify-content: center;
}
.modal {
  background: #1a1025; border: 1px solid var(--border-h);
  border-radius: var(--r-xl); padding: 24px; max-width: 550px; width: 90%;
  max-height: 80vh; overflow-y: auto;
}
.modal h3 { font-family: 'Bebas Neue', sans-serif; font-size: 24px; letter-spacing: 2px; color: var(--accent2); margin-bottom: 16px; }
.modal-field { margin-bottom: 12px; }
.modal-field label { display: block; font-size: 11px; color: var(--muted); margin-bottom: 3px; text-transform: uppercase; letter-spacing: 0.5px; }
.modal-field input, .modal-field select {
  width: 100%; padding: 8px 12px; border-radius: var(--r-md);
  border: 1px solid var(--border); background: rgba(0,0,0,0.3);
  color: var(--text); font-family: 'DM Sans', sans-serif; font-size: 13px;
}
.modal-field input:focus { outline: none; border-color: var(--accent); }
.exercise-edit-row { display: flex; gap: 6px; align-items: center; margin-bottom: 6px; }
.exercise-edit-row input { flex: 1; }
.exercise-edit-row .small { width: 50px; }
.modal-actions { display: flex; gap: 8px; margin-top: 16px; justify-content: flex-end; }
.btn {
  padding: 8px 18px; border-radius: var(--r-pill);
  border: 1px solid var(--border);
  background: var(--glass);
  color: var(--text);
  font-family: 'DM Sans', sans-serif; font-size: 12px;
  cursor: pointer; transition: all 0.2s;
}
.btn:hover { background: var(--glass-h); }
.btn.accent { background: linear-gradient(135deg, rgba(255,126,95,0.38), rgba(200,60,60,0.38)); border-color: var(--border-h); }
.btn.green { background: rgba(46,204,113,0.2); border-color: rgba(46,204,113,0.4); color: #2ecc71; }
.btn.red { background: rgba(255,80,80,0.15); border-color: rgba(255,100,100,0.3); color: #ff9090; }

@media (max-width: 860px) {
  .bento { grid-template-columns: 1fr; }
  .card-progress { grid-column: 1; }
  .card-timer { grid-column: 1; grid-row: auto; }
  .card-exercises { grid-column: 1; }
  .top-row { flex-direction: column; align-items: flex-start; }
}
</style>
</head>
<body>

<div class="blob blob-1"></div>
<div class="blob blob-2"></div>
<div class="blob blob-3"></div>
<div class="bg-symbols" id="bgSymbols"></div>

<svg width="0" height="0" style="position:absolute">
  <defs>
    <linearGradient id="ringGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#ff7e5f"/>
      <stop offset="100%" stop-color="#ffb347"/>
    </linearGradient>
    <linearGradient id="timerGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ff6b6b"/>
      <stop offset="100%" stop-color="#ffb347"/>
    </linearGradient>
  </defs>
</svg>

<div class="page">
  <!-- TOP ROW -->
  <div class="top-row">
    <div class="brand-block">
      <h1>ТРЕНИРОВКИ</h1>
      <span class="brand-badge">Набор массы · Дома</span>
    </div>
    <div class="streak-days-block" id="streakDaysBlock">
      <div class="streak-mini">
        <span class="icon">🔥</span>
        <span class="num" id="streakNum">0</span>
      </div>
      <div class="day-pills" id="dayPillsContainer"></div>
      <button class="add-day-btn" id="addDayBtn" onclick="addDay()" title="Добавить день">+</button>
    </div>
  </div>

  <!-- BENTO -->
  <div class="bento">
    <div class="card card-progress">
      <div class="prog-ring-wrap">
        <svg width="70" height="70" viewBox="0 0 70 70">
          <circle class="prog-ring-bg" cx="35" cy="35" r="30"/>
          <circle class="prog-ring-fill" id="prog-ring" cx="35" cy="35" r="30"
            stroke-dasharray="188.5" stroke-dashoffset="188.5"/>
        </svg>
        <div class="prog-center" id="prog-pct">0%</div>
      </div>
      <div class="prog-bar-wrap">
        <div class="prog-text" style="margin-bottom:8px">
          <h3 id="prog-title">Начнём тренировку</h3>
          <p id="prog-sub">Отмечай подходы ниже</p>
        </div>
        <div class="prog-bar-track">
          <div class="prog-bar-fill" id="prog-fill" style="width:0%"></div>
        </div>
        <div class="prog-stats" style="margin-top:6px">
          <div class="prog-stat">Сделано: <span id="prog-done">0</span></div>
          <div class="prog-stat">Осталось: <span id="prog-left">0</span></div>
          <div class="prog-stat">Всего: <span id="prog-total">0</span></div>
        </div>
      </div>
    </div>

    <div class="card card-timer">
      <div class="timer-mode">
        <button class="timer-mode-btn active" onclick="switchClock('timer')">Таймер</button>
        <button class="timer-mode-btn" onclick="switchClock('sw')">Секундомер</button>
      </div>
      <div id="panel-timer" style="display:flex;flex-direction:column;align-items:center;gap:12px;width:100%">
        <div class="timer-ring-wrap">
          <svg width="130" height="130" viewBox="0 0 130 130">
            <circle class="tr-bg" cx="65" cy="65" r="55"/>
            <circle class="tr-fill" id="timer-ring" cx="65" cy="65" r="55"
              stroke-dasharray="345.6" stroke-dashoffset="0"/>
          </svg>
          <div class="timer-center">
            <div class="timer-digits" id="timer-display">01:30</div>
            <div class="timer-label">отдых</div>
          </div>
        </div>
        <div class="presets">
          <button class="preset-pill" onclick="setTimer(60)">1 мин</button>
          <button class="preset-pill" onclick="setTimer(90)">1:30</button>
          <button class="preset-pill" onclick="setTimer(120)">2 мин</button>
          <button class="preset-pill" onclick="setTimer(180)">3 мин</button>
        </div>
        <div class="timer-controls">
          <button class="t-btn primary" id="timer-btn" onclick="toggleTimer()">Старт</button>
          <button class="t-btn" onclick="resetTimer()">Сброс</button>
        </div>
      </div>
      <div id="panel-sw" style="display:none;flex-direction:column;align-items:center;gap:12px;width:100%">
        <div class="timer-ring-wrap">
          <svg width="130" height="130" viewBox="0 0 130 130">
            <circle class="tr-bg" cx="65" cy="65" r="55"/>
            <circle class="tr-fill" id="sw-ring" cx="65" cy="65" r="55"
              stroke-dasharray="345.6" stroke-dashoffset="345.6"/>
          </svg>
          <div class="timer-center">
            <div class="timer-digits" id="sw-display" style="font-size:28px">00:00</div>
            <div class="timer-label">секундомер</div>
          </div>
        </div>
        <div class="timer-controls">
          <button class="t-btn primary" id="sw-btn" onclick="toggleSW()">Старт</button>
          <div class="t-row">
            <button class="t-btn" onclick="lapSW()">Круг</button>
            <button class="t-btn" onclick="resetSW()">Сброс</button>
          </div>
        </div>
        <div class="laps-box" id="laps-list"></div>
      </div>
    </div>

    <div class="card card-exercises" id="exercisesContainer"></div>
  </div>

  <div class="bottom-row">
    <div class="bottom-left">
      <button class="complete-day-btn" onclick="completeDay()">✓ Завершить день</button>
      <button class="save-preset-btn" onclick="savePreset()">💾 Сохранить пресет</button>
      <select class="preset-select" id="presetSelect" onchange="loadPreset(this.value)">
        <option value="">— Загрузить пресет —</option>
      </select>
    </div>
    <button class="reset-pill" onclick="resetDay()">Сбросить день</button>
  </div>
</div>

<div id="modalContainer"></div>

<script>
(function(){
  const syms = ['✦','◈','⊕','✗','▲','◇','⬡','⊞','✚','◉','⌬','⊿','✕','△','◻','⬢','╋','⋆','✧','◆','⟡','⬟','✱','⌀'];
  const container = document.getElementById('bgSymbols');
  for(let i=0;i<28;i++){
    const el = document.createElement('div');
    el.className = 'bg-sym';
    const sym = syms[Math.floor(Math.random()*syms.length)];
    const size = 18 + Math.random()*90;
    const x = Math.random()*100;
    const y = Math.random()*100;
    const dur = 5 + Math.random()*8;
    const delay = -Math.random()*10;
    const r0 = (Math.random()*40-20).toFixed(1)+'deg';
    const r1 = (Math.random()*40-20).toFixed(1)+'deg';
    const op = (0.12 + Math.random()*0.18).toFixed(3);
    el.textContent = sym;
    el.style.cssText = `left:${x}%; top:${y}%; font-size:${size}px; opacity:${op}; --r0:${r0}; --r1:${r1}; animation-duration:${dur}s; animation-delay:${delay}s;`;
    container.appendChild(el);
  }
})();

// ── STATE ──
const STORAGE_PLAN = 'customPlan_v2';
const STORAGE_PRESETS = 'planPresets_v2';
const STORAGE_STREAK = 'streakData';

const DEFAULT_PLAN = [
  { name: 'ГРУДЬ / ТРИЦЕПС', short: 'Грудь', exercises: [
    { name: "Отжимания широкие", sets: 4, target: "12–15" },
    { name: "Жим гантелей лёжа", sets: 4, target: "10–12" },
    { name: "Разводка гантелей", sets: 3, target: "12" },
    { name: "Отжимания узкие", sets: 3, target: "12" },
    { name: "Французский жим", sets: 3, target: "12" },
  ]},
  { name: 'СПИНА / БИЦЕПС', short: 'Спина', exercises: [
    { name: "Подтягивания широкие", sets: 4, target: "макс." },
    { name: "Подтягивания обр. хватом", sets: 4, target: "макс." },
    { name: "Тяга гантели в наклоне", sets: 4, target: "10–12" },
    { name: "Сгибания на бицепс", sets: 3, target: "12" },
    { name: "Молотковые сгибания", sets: 3, target: "12" },
  ]},
  { name: 'НОГИ / ПЛЕЧИ', short: 'Ноги', exercises: [
    { name: "Приседания с гантелями", sets: 4, target: "15" },
    { name: "Выпады с гантелями", sets: 3, target: "12" },
    { name: "Румынская тяга", sets: 4, target: "12" },
    { name: "Жим сидя над головой", sets: 4, target: "12" },
    { name: "Подъём в стороны", sets: 3, target: "15" },
  ]},
  { name: 'ПОЛНОЕ ТЕЛО', short: 'Фулл', exercises: [
    { name: "Подтягивания", sets: 5, target: "макс." },
    { name: "Отжимания с возвышения", sets: 4, target: "12" },
    { name: "Болгарские приседания", sets: 3, target: "10" },
    { name: "Тяга к подбородку", sets: 3, target: "12" },
    { name: "Планка", sets: 3, target: "45–60 сек" },
  ]},
];

function loadPlan() {
  try { const r = localStorage.getItem(STORAGE_PLAN); return r ? JSON.parse(r) : JSON.parse(JSON.stringify(DEFAULT_PLAN)); }
  catch { return JSON.parse(JSON.stringify(DEFAULT_PLAN)); }
}
function savePlan(plan) { localStorage.setItem(STORAGE_PLAN, JSON.stringify(plan)); }

let PLAN = loadPlan();
let currentDay = 0;

const sk = (d,e) => `wt2_d${d}_e${e}`;
const wk = (d,e) => `wt2_d${d}_e${e}_w`;
const loadSt = (d,e,n) => { try { const r=localStorage.getItem(sk(d,e)); return r?JSON.parse(r):new Array(n).fill(false); } catch{ return new Array(n).fill(false); } };
const saveSt = (d,e,s) => localStorage.setItem(sk(d,e), JSON.stringify(s));

// ── STREAK ──
function getStreak() {
  try { const r = localStorage.getItem(STORAGE_STREAK); return r ? JSON.parse(r) : { streak: 0, lastDate: null }; }
  catch { return { streak: 0, lastDate: null }; }
}
function saveStreak(d) { localStorage.setItem(STORAGE_STREAK, JSON.stringify(d)); }
function updateStreakUI() {
  document.getElementById('streakNum').textContent = getStreak().streak;
}
function completeDay() {
  const s = getStreak();
  const today = new Date().toISOString().split('T')[0];
  if (s.lastDate === today) { alert('Сегодня уже отмечено! 🔥'); return; }
  const yesterday = new Date(Date.now()-86400000).toISOString().split('T')[0];
  s.streak = (s.lastDate === yesterday) ? s.streak + 1 : 1;
  s.lastDate = today;
  saveStreak(s);
  updateStreakUI();
  alert(`День засчитан! Стрик: ${s.streak} дн. 🔥`);
}

// ── DAYS MANAGEMENT ──
function addDay() {
  if (PLAN.length >= 7) { alert('Максимум 7 дней!'); return; }
  const name = prompt('Название дня (например, "ПЛЕЧИ"):');
  if (!name || !name.trim()) return;
  const short = prompt('Короткое имя для кнопки (например, "Плечи"):');
  if (!short || !short.trim()) return;
  PLAN.push({ name: name.trim().toUpperCase(), short: short.trim(), exercises: [{ name: "Новое упражнение", sets: 3, target: "10" }] });
  savePlan(PLAN);
  renderAll();
  switchDay(PLAN.length - 1);
}

function deleteDay(di) {
  if (PLAN.length <= 1) { alert('Должен быть хотя бы 1 день!'); return; }
  if (!confirm(`Удалить день «${PLAN[di].name}»? Прогресс дня сбросится.`)) return;
  PLAN.splice(di, 1);
  savePlan(PLAN);
  if (currentDay >= PLAN.length) currentDay = PLAN.length - 1;
  // Очистить прогресс удалённого дня
  for (let i = 0; i < 20; i++) {
    localStorage.removeItem(sk(di, i));
    localStorage.removeItem(wk(di, i));
  }
  // Сдвинуть ключи для следующих дней
  for (let d = di; d < PLAN.length; d++) {
    for (let e = 0; e < 20; e++) {
      const oldS = localStorage.getItem(sk(d+1, e));
      const oldW = localStorage.getItem(wk(d+1, e));
      if (oldS !== null) { localStorage.setItem(sk(d, e), oldS); localStorage.removeItem(sk(d+1, e)); }
      if (oldW !== null) { localStorage.setItem(wk(d, e), oldW); localStorage.removeItem(wk(d+1, e)); }
    }
  }
  renderAll();
}

function renderDayPills() {
  const container = document.getElementById('dayPillsContainer');
  const addBtn = document.getElementById('addDayBtn');
  container.innerHTML = '';
  PLAN.forEach((day, i) => {
    const pill = document.createElement('button');
    pill.className = 'day-pill' + (i === currentDay ? ' active' : '');
    pill.innerHTML = `${day.short} <span class="del-day" onclick="event.stopPropagation();deleteDay(${i})" title="Удалить день">×</span>`;
    pill.onclick = () => switchDay(i);
    container.appendChild(pill);
  });
  // Показать/скрыть кнопку "+"
  addBtn.style.display = PLAN.length >= 7 ? 'none' : 'flex';
}

// ── RENDER EXERCISES ──
function renderExercises() {
  const container = document.getElementById('exercisesContainer');
  container.innerHTML = '';
  PLAN.forEach((day, di) => {
    const dayDiv = document.createElement('div');
    dayDiv.className = 'day';
    dayDiv.id = `day-${di}`;
    dayDiv.style.display = di === currentDay ? 'block' : 'none';
    let exHTML = '';
    day.exercises.forEach((ex, ei) => {
      const state = loadSt(di, ei, ex.sets);
      const weight = localStorage.getItem(wk(di,ei)) || '';
      let dots = '';
      for (let s = 0; s < ex.sets; s++)
        dots += `<button class="set-dot${state[s]?' done':''}" onclick="toggleSet(${di},${ei},${s})">${s+1}</button>`;
      exHTML += `
        <div class="ex-card${state.every(Boolean)?' completed':''}" id="ex-${di}-${ei}">
          <span class="ex-name">${ex.name}</span>
          <span class="ex-target">${ex.target}</span>
          <div class="ex-controls">${dots}</div>
          <div class="ex-weight">
            <span class="kg-label">кг</span>
            <input class="kg-input" type="number" placeholder="0" value="${weight}" min="0" step="0.5"
              oninput="localStorage.setItem('${wk(di,ei)}',this.value)">
          </div>
        </div>`;
    });
    dayDiv.innerHTML = `
      <div class="day-header">
        <span class="day-name">${day.name}</span>
        <span class="day-count">${day.exercises.length} упр.</span>
        <button class="edit-day-btn" onclick="openDayEditor(${di})">✎ Ред.</button>
      </div>
      <div class="exercise-list">${exHTML}</div>`;
    container.appendChild(dayDiv);
  });
  updateProgress(currentDay);
}

function switchDay(day) {
  currentDay = day;
  document.querySelectorAll('.day').forEach((d,i) => d.style.display = i===day?'block':'none');
  renderDayPills();
  updateProgress(day);
}

function toggleSet(day, ei, s) {
  const state = loadSt(day, ei, PLAN[day].exercises[ei].sets);
  state[s] = !state[s]; saveSt(day, ei, state);
  const el = document.getElementById(`ex-${day}-${ei}`);
  el.className = 'ex-card' + (state.every(Boolean) ? ' completed' : '');
  el.querySelectorAll('.set-dot').forEach((b,i) => b.className = 'set-dot'+(state[i]?' done':''));
  updateProgress(day);
}

function updateProgress(day) {
  let total=0, done=0;
  PLAN[day].exercises.forEach((ex,ei)=>{
    const s=loadSt(day,ei,ex.sets); total+=ex.sets; done+=s.filter(Boolean).length;
  });
  const pct = total>0 ? Math.round(done/total*100) : 0;
  const circ = 188.5;
  document.getElementById('prog-ring').style.strokeDashoffset = circ - (circ * pct/100);
  document.getElementById('prog-pct').textContent = pct+'%';
  document.getElementById('prog-fill').style.width = pct+'%';
  document.getElementById('prog-done').textContent = done;
  document.getElementById('prog-left').textContent = total-done;
  document.getElementById('prog-total').textContent = total;
  document.getElementById('prog-title').textContent = pct===100 ? '🎉 Завершена!' : pct>0 ? `${pct}%` : 'Начнём';
  document.getElementById('prog-sub').textContent = pct===100 ? 'Отлично!' : `${done}/${total} подходов`;
}

function resetDay() {
  if (!confirm('Сбросить прогресс этого дня?')) return;
  PLAN[currentDay].exercises.forEach((_,ei) => localStorage.removeItem(sk(currentDay,ei)));
  renderExercises();
}

// ── DAY EDITOR ──
function openDayEditor(di) {
  const day = PLAN[di];
  const modal = document.getElementById('modalContainer');
  let exRows = day.exercises.map((ex,ei) => `
    <div class="exercise-edit-row">
      <input type="text" value="${ex.name}" placeholder="Название" class="ex-name-inp">
      <input type="number" value="${ex.sets}" placeholder="Подх." class="small ex-sets-inp" min="1" max="20">
      <input type="text" value="${ex.target}" placeholder="Цель" class="ex-target-inp">
      <button class="btn red" onclick="this.parentElement.remove()">✕</button>
    </div>`).join('');
  modal.innerHTML = `
    <div class="modal-overlay" onclick="if(event.target===this)closeModal()">
      <div class="modal">
        <h3>Ред. день</h3>
        <div class="modal-field">
          <label>Название</label>
          <input type="text" id="editDayName" value="${day.name}">
        </div>
        <div class="modal-field">
          <label>Короткое имя</label>
          <input type="text" id="editDayShort" value="${day.short}">
        </div>
        <div class="modal-field">
          <label>Упражнения</label>
          <div id="exRowsContainer">${exRows}</div>
          <button class="btn green" onclick="addExRow()" style="margin-top:6px">+ Упражнение</button>
        </div>
        <div class="modal-actions">
          <button class="btn" onclick="closeModal()">Отмена</button>
          <button class="btn accent" onclick="saveDayEdit(${di})">Сохранить</button>
        </div>
      </div>
    </div>`;
}

function addExRow() {
  const container = document.getElementById('exRowsContainer');
  const row = document.createElement('div');
  row.className = 'exercise-edit-row';
  row.innerHTML = `
    <input type="text" value="" placeholder="Название" class="ex-name-inp">
    <input type="number" value="3" placeholder="Подх." class="small ex-sets-inp" min="1" max="20">
    <input type="text" value="" placeholder="Цель" class="ex-target-inp">
    <button class="btn red" onclick="this.parentElement.remove()">✕</button>`;
  container.appendChild(row);
}

function saveDayEdit(di) {
  const name = document.getElementById('editDayName').value.trim();
  const short = document.getElementById('editDayShort').value.trim();
  if (!name || !short) { alert('Заполни названия!'); return; }
  const rows = document.querySelectorAll('#exRowsContainer .exercise-edit-row');
  const exercises = [];
  rows.forEach(row => {
    const n = row.querySelector('.ex-name-inp').value.trim();
    const s = parseInt(row.querySelector('.ex-sets-inp').value) || 3;
    const t = row.querySelector('.ex-target-inp').value.trim();
    if (n) exercises.push({ name: n, sets: s, target: t || 'повт.' });
  });
  if (exercises.length === 0) { alert('Нужно минимум 1 упражнение!'); return; }
  PLAN[di].name = name;
  PLAN[di].short = short;
  PLAN[di].exercises = exercises;
  savePlan(PLAN);
  for (let i = 0; i < 20; i++) { localStorage.removeItem(sk(di, i)); localStorage.removeItem(wk(di, i)); }
  closeModal();
  renderAll();
}

function closeModal() { document.getElementById('modalContainer').innerHTML = ''; }

// ── PRESETS ──
function getPresets() { try { const r = localStorage.getItem(STORAGE_PRESETS); return r ? JSON.parse(r) : {}; } catch { return {}; } }
function savePresets(p) { localStorage.setItem(STORAGE_PRESETS, JSON.stringify(p)); }
function savePreset() {
  const name = prompt('Название пресета:');
  if (!name || !name.trim()) return;
  const presets = getPresets();
  presets[name.trim()] = JSON.parse(JSON.stringify(PLAN));
  savePresets(presets);
  renderPresetSelect();
  alert(`Пресет «${name.trim()}» сохранён!`);
}
function loadPreset(name) {
  if (!name) return;
  if (!confirm(`Загрузить «${name}»? Текущий план заменится.`)) { document.getElementById('presetSelect').value = ''; return; }
  const presets = getPresets();
  if (presets[name]) {
    PLAN = JSON.parse(JSON.stringify(presets[name]));
    savePlan(PLAN);
    currentDay = 0;
    renderAll();
    document.getElementById('presetSelect').value = '';
  }
}
function renderPresetSelect() {
  const sel = document.getElementById('presetSelect');
  const presets = getPresets();
  sel.innerHTML = '<option value="">— Загрузить пресет —</option>';
  Object.keys(presets).forEach(n => { const o = document.createElement('option'); o.value = n; o.textContent = n; sel.appendChild(o); });
}

function renderAll() {
  renderDayPills();
  renderExercises();
  renderPresetSelect();
  updateStreakUI();
}

// ── INIT ──
renderAll();
updateProgress(currentDay);

// ── TIMER ──
function switchClock(m) {
  document.querySelectorAll('.timer-mode-btn').forEach((b,i)=>b.classList.toggle('active',(i===0&&m==='timer')||(i===1&&m==='sw')));
  document.getElementById('panel-timer').style.display = m==='timer'?'flex':'none';
  document.getElementById('panel-sw').style.display = m==='sw'?'flex':'none';
}
const CIRC_T = 345.6;
let timerTotal=90, timerLeft=90, timerInt=null, timerOn=false;
const fmt = s => String(Math.floor(s/60)).padStart(2,'0')+':'+String(s%60).padStart(2,'0');
function updateTimerRing() { document.getElementById('timer-ring').style.strokeDashoffset = CIRC_T - (CIRC_T * timerLeft/timerTotal); }
function setTimer(s) { resetTimer(); timerTotal=s; timerLeft=s; document.getElementById('timer-display').textContent=fmt(s); document.getElementById('timer-display').className='timer-digits'; updateTimerRing(); }
function toggleTimer() {
  if (timerOn) { clearInterval(timerInt); timerOn=false; document.getElementById('timer-btn').textContent='Старт'; return; }
  if (timerLeft<=0) timerLeft=timerTotal;
  timerOn=true; document.getElementById('timer-btn').textContent='Пауза';
  timerInt = setInterval(()=>{
    timerLeft--;
    const d = document.getElementById('timer-display');
    d.textContent = fmt(timerLeft);
    d.className = 'timer-digits'+(timerLeft<=10&&timerLeft>0?' warning':timerLeft<=0?' done':'');
    updateTimerRing();
    if (timerLeft<=0) { clearInterval(timerInt); timerOn=false; document.getElementById('timer-btn').textContent='Старт'; }
  }, 1000);
}
function resetTimer() { clearInterval(timerInt); timerOn=false; timerLeft=timerTotal; document.getElementById('timer-display').textContent=fmt(timerTotal); document.getElementById('timer-display').className='timer-digits'; document.getElementById('timer-btn').textContent='Старт'; updateTimerRing(); }

let swMs=0, swInt=null, swOn=false, swLaps=[], swLastLap=0;
const fmtSW = ms => { const s=Math.floor(ms/1000),m=Math.floor(s/60); return String(m).padStart(2,'0')+':'+String(s%60).padStart(2,'0')+'.'+String(Math.floor((ms%1000)/10)).padStart(2,'0'); };
function toggleSW() {
  if (swOn) { clearInterval(swInt); swOn=false; document.getElementById('sw-btn').textContent='Продолжить'; return; }
  const start=Date.now()-swMs; swOn=true; document.getElementById('sw-btn').textContent='Пауза';
  swInt=setInterval(()=>{
    swMs=Date.now()-start;
    document.getElementById('sw-display').textContent=fmtSW(swMs);
    document.getElementById('sw-ring').style.strokeDashoffset = CIRC_T - (CIRC_T * ((swMs%60000)/60000));
  },30);
}
function lapSW() {
  if(!swOn&&swMs===0) return;
  const lapTime = swMs - swLastLap; swLastLap = swMs;
  swLaps.unshift({n:swLaps.length+1, t:fmtSW(swMs), lap:fmtSW(lapTime)});
  document.getElementById('laps-list').innerHTML = swLaps.map(l=>`<div class="lap-item"><span>Круг ${l.n}</span><span style="color:var(--muted)">${l.lap}</span><span>${l.t}</span></div>`).join('');
}
function resetSW() { clearInterval(swInt); swOn=false; swMs=0; swLaps=[]; swLastLap=0; document.getElementById('sw-display').textContent='00:00'; document.getElementById('sw-btn').textContent='Старт'; document.getElementById('laps-list').innerHTML=''; document.getElementById('sw-ring').style.strokeDashoffset=CIRC_T; }
</script>
</body>
</html>
